# SPDX-License-Identifier: Apache-2.0
#
# wardtest 10k: 1 reffs server + 4 clients over NFSv4.2
#
# Build and run:
#   ./deploy/run-docker.sh          (builds both images, runs compose)
#   docker compose -f deploy/docker-compose.yml down -v
#
# Each client does 2500 iterations (10k total across 4 containers).
# The control file on the NFS mount ensures all clients use the
# same encoding parameters.  Client 1 creates the wardtest
# directories; clients 2-4 wait briefly for them to appear.

x-client-common: &client-common
  build:
    context: ..
    dockerfile: deploy/Dockerfile.client
  privileged: true
  networks:
    wardnet:
  depends_on:
    server:
      condition: service_healthy

services:
  server:
    image: wt-server
    container_name: wt-server
    hostname: wt-server
    privileged: true
    networks:
      wardnet:
        aliases:
          - wt-server
    volumes:
      - ${WARDTEST_DIR:-.}/deploy/server.toml:/etc/reffs/reffsd.toml:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -tln | grep -q :2049"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  client1:
    <<: *client-common
    container_name: wt-client1
    hostname: wt-client1
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /mnt/nfs
        mount -o vers=4.2,sec=sys,hard,timeo=600 wt-server:/ /mnt/nfs
        mkdir -p /mnt/nfs/wardtest/data /mnt/nfs/wardtest/meta /mnt/nfs/wardtest/history
        wardtest \
          --data /mnt/nfs/wardtest/data \
          --meta /mnt/nfs/wardtest/meta \
          --history /mnt/nfs/wardtest/history \
          --iterations 2500 \
          --clients 2 \
          --report 10
        EXIT=$$?
        umount /mnt/nfs 2>/dev/null || true
        exit $$EXIT

  client2:
    <<: *client-common
    container_name: wt-client2
    hostname: wt-client2
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /mnt/nfs
        mount -o vers=4.2,sec=sys,hard,timeo=600 wt-server:/ /mnt/nfs
        while [ ! -d /mnt/nfs/wardtest/data ]; do sleep 1; done
        wardtest \
          --data /mnt/nfs/wardtest/data \
          --meta /mnt/nfs/wardtest/meta \
          --history /mnt/nfs/wardtest/history \
          --iterations 2500 \
          --clients 2 \
          --seed 0xdeadbeef \
          --report 10
        EXIT=$$?
        umount /mnt/nfs 2>/dev/null || true
        exit $$EXIT

  client3:
    <<: *client-common
    container_name: wt-client3
    hostname: wt-client3
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /mnt/nfs
        mount -o vers=4.2,sec=sys,hard,timeo=600 wt-server:/ /mnt/nfs
        while [ ! -d /mnt/nfs/wardtest/data ]; do sleep 1; done
        wardtest \
          --data /mnt/nfs/wardtest/data \
          --meta /mnt/nfs/wardtest/meta \
          --history /mnt/nfs/wardtest/history \
          --iterations 2500 \
          --clients 2 \
          --seed 0xcafebabe \
          --report 10
        EXIT=$$?
        umount /mnt/nfs 2>/dev/null || true
        exit $$EXIT

  client4:
    <<: *client-common
    container_name: wt-client4
    hostname: wt-client4
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /mnt/nfs
        mount -o vers=4.2,sec=sys,hard,timeo=600 wt-server:/ /mnt/nfs
        while [ ! -d /mnt/nfs/wardtest/data ]; do sleep 1; done
        wardtest \
          --data /mnt/nfs/wardtest/data \
          --meta /mnt/nfs/wardtest/meta \
          --history /mnt/nfs/wardtest/history \
          --iterations 2500 \
          --clients 2 \
          --seed 0xfeedface \
          --report 10
        EXIT=$$?
        umount /mnt/nfs 2>/dev/null || true
        exit $$EXIT

networks:
  wardnet:
    driver: bridge
